<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="antGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8fff0"/>
      <stop offset="60%" stop-color="#7cffd4"/>
      <stop offset="100%" stop-color="#32ffb4"/>
    </linearGradient>
  </defs>

  <g filter="url(#glow)" fill="url(#antGrad)" stroke="#7cffd4" stroke-width="1.8" stroke-linecap="round">
    <!-- Head -->
    <circle cx="14" cy="16" r="6"/>
    <!-- Thorax -->
    <circle cx="30" cy="16" r="5.5"/>
    <!-- Abdomen -->
    <circle cx="44" cy="16" r="5"/>

    <!-- Antennae -->
    <path d="M10 12 C 6 8, 3 8, 2 9" fill="none"/>
    <path d="M10 20 C 6 24, 3 24, 2 23" fill="none"/>

    <!-- Legs -->
    <path d="M25 12 L 20 7" fill="none"/>
    <path d="M25 20 L 20 25" fill="none"/>
    <path d="M35 12 L 31 7" fill="none"/>
    <path d="M35 20 L 31 25" fill="none"/>
  </g>
</svg>
